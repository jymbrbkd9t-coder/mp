<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代汉语语气词训练</title>
    <style>
        /* 全局古风样式 */
        body {
            background-color: #f4f1ea; /* 宣纸底色 */
            background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png");
            font-family: "Kaiti", "STKaiti", "楷体", serif;
            color: #332c22;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.6);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border: 2px solid #8b4513;
            outline: 8px solid #f4f1ea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 装饰角标 */
        .container::before {
            content: "语气助词";
            position: absolute;
            top: 10px;
            right: 10px;
            border: 1px solid #800000;
            color: #800000;
            padding: 2px 5px;
            font-size: 12px;
            opacity: 0.6;
        }

        h2 {
            text-align: center;
            color: #800000;
            border-bottom: 2px dashed #8b4513;
            padding-bottom: 15px;
            margin-top: 0;
            letter-spacing: 4px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #5d513c;
            margin-bottom: 20px;
        }

        #sentence {
            font-size: 22px;
            margin: 40px 0;
            min-height: 80px;
            font-weight: bold;
            text-align: center;
            line-height: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 5px solid #800000;
            padding: 0 20px;
        }

        /* 选项按钮：印章风格 */
        #options button {
            display: block;
            margin: 15px 0;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            background: transparent;
            border: 1px solid #8b4513;
            color: #332c22;
            font-family: inherit;
            font-size: 18px;
            transition: all 0.2s;
            border-radius: 2px;
        }

        #options button:hover {
            background: rgba(139, 69, 19, 0.1);
            border-color: #800000;
        }

        /* 控制按钮 */
        .ctrl-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .ctrl-btn {
            flex: 1;
            font-size: 13px;
            padding: 5px;
            background: #e8e2d5;
            border: 1px solid #c4b7a1;
            cursor: pointer;
        }

        /* 结果反馈 */
        #result {
            margin-top: 20px;
            min-height: 50px;
            font-size: 18px;
            color: #b22222;
            text-align: center;
            font-weight: bold;
        }

        #next-btn {
            margin-top: 20px;
            background: #800000;
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 18px;
            cursor: pointer;
            visibility: hidden; /* 默认隐藏，答题后显示 */
        }

        #next-btn.visible {
            visibility: visible;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>古代汉语语气词训练</h2>

    <div class="ctrl-group">
        <button class="ctrl-btn" onclick="toggleMode()">🔄 切换模式</button>
        <button class="ctrl-btn" onclick="startWrongMode()">📖 错题复习</button>
    </div>

    <div class="info-bar">
        <span id="modeText">模式：顺序</span>
        <span id="scoreText">得分：0 / 100</span>
    </div>

    <div id="sentence">加载中...</div>
    <div id="options"></div>
    
    <div id="result"></div>
    <button id="next-btn" onclick="nextQuestion()">下一题</button>
</div>

<script>
const originalQuestions = [
    {id:1,sentence:"陈胜者，阳城人__。",options:["判断确认","情绪","疑问"],answer:0,particle:"也",explanation:"幫助表判斷、加強判斷的肯定語氣"},
    {id:2,sentence:"朽木不可雕__。",options:["陈述加强","疑问","推测"],answer:0,particle:"也",explanation:"加強陳述語氣"},
    {id:3,sentence:"攻之不克，吾其还__。",options:["祈使决断","疑问","感叹"],answer:0,particle:"也",explanation:"使祈使語氣更堅決、肯定和強烈。"},
    {id:4,sentence:"及诸河，则在舟中__。",options:["已然变化","判断","疑问"],answer:0,particle:"矣",explanation:"已然：原來就有這種情況，説話人把它當作新情況提出來或告知別人。"},
    {id:5,sentence:"司马子反曰：“子之国何如？”华元曰：“惫__。”",options:["将然状态","恒常","判断"],answer:0,particle:"矣",explanation:"將然：現在還沒出現某種情況，但預料它必然出現，當作新情況告訴別人。"},
    {id:6,sentence:"廷掾起__。",options:["祈使推动","陈述","疑问"],answer:0,particle:"矣",explanation:"祈使句句尾（將然）：希望對方實現某種行焉或完成某種事情，帶有“將然”性質。"},
    {id:7,sentence:"二世問左右：此乃鹿【也】？",options:["表疑问","表确认","感叹"],answer:0,particle:"也",explanation:"“也”不表疑問語氣，句子的疑問由句中其他詞傳達，“也”仍表確認語氣。"},
    {id:8,sentence:"能无战__？",options:["反问","普通疑问","命令"],answer:0,particle:"乎",explanation:"反問（無疑而問）。如果句中使用“不”、“無”等否定詞,就構成否定形式，表達的也是肯定的內容。"},
    {id:9,sentence:"公得毋误__？",options:["推测疑问","判断","感叹"],answer:0,particle:"乎",explanation:"推測（疑信參半的問話形式）。常同時出現“其”“無乃(毋乃)”“得無(得毋、得微、得非)”等表示委婉的詞語,以增強推測的委婉語氣。"},
    {id:10,sentence:"是鲁孔丘__？",options:["半信半疑，求证","反问","纯粹疑问"],answer:0,particle:"与",explanation:"是非問句句尾：不表示純粹的疑問，而是説話人心目中已有了某種看法，但還不能深信不疑，提出來要求證實。"},
    {id:11,sentence:"谁__，哭者？",options:["特指疑问","反问","求证"],answer:0,particle:"与",explanation:"特指問句句尾：幫助表達疑問語氣，句中另有疑問詞，疑問重點落在疑問詞上。"},
    {id:12,sentence:"岂得之难而失之易__？",options:["反问","普通疑问","陈述"],answer:0,particle:"与",explanation:"選擇問句句尾：可譯成“呢”"},
    {id:13,sentence:"嗟乎！冤__烹也！",options:["强烈感叹","判断","疑问"],answer:0,particle:"哉",explanation:"句尾表示比較強烈的感歎，相當於今天的 “啊”。如果“哉”跟它前面的謂語一起提到句首，感歎語氣就更強烈。"},
    {id:14,sentence:"夫当今生民之患，果安在【哉】？",options:["表疑问","表感叹","表判断"],answer:0,particle:"哉",explanation:"跟疑問詞配合用於詢問句和反問句，句子的詢問語氣和反問語氣由疑問詞來表達,“哉”字帶給句子感歎的色彩"},
    {id:15,sentence:"必先事而申之以敬，慎終如始，終始如一，【夫】是之謂大吉。",options:["总结推论","判断","感叹"],answer:0,particle:"夫",explanation:" 用於句首，表示將要發表議論，引出議論內容。用在複句的最後一個分句的句首，則常常表示對上文的結語或推論。"},
    {id:16,sentence:"逝者如斯夫！",options:["感叹","判断","疑问"],answer:0,particle:"夫",explanation:"表感叹"},
    {id:17,sentence:"阙秦以利晋，【唯】君图之。",options:["祈使期望","判断","疑问"],answer:0,particle:"唯",explanation:"用於祈使句：表示期望的語氣。"},
    {id:18,sentence:"【唯】命不于常。",options:["引出主题","疑问","感叹"],answer:0,particle:"唯",explanation:"用於句首，表示引出主語或強調時間，一般可以不譯。"},
    {id:19,sentence:"晋楚【唯】天所授。",options:["帮助加强判断","判断词","感叹"],answer:0,particle:"唯",explanation:"句中的“唯(惟、維)”往往用來幫助加強判斷，不可譯為“是”。"},
    {id:20,sentence:"甚【矣】，汝之不惠!",options:["表陈述","表感叹","表疑问"],answer:0,particle:"矣",explanation:"感歎句句尾：它表示的仍是陳述語氣,句子的感歎語氣是靠別的手段來表示的。"}
];

let questions = [...originalQuestions];
let current = 0, score = 0, locked = false;
let wrongBook = {};
let currentQ = null;

function shuffle(arr) {
    let a = arr.map((v, i) => ({v, i}));
    a.sort(() => Math.random() - 0.5);
    return a;
}

function prepare(q) {
    let s = shuffle(q.options);
    return {
        ...q,
        shuffledOptions: s.map(x => x.v),
        correctIndex: s.findIndex(x => x.i === q.answer)
    };
}

function loadQuestion() {
    locked = false;
    document.getElementById("result").innerText = "";
    document.getElementById("next-btn").classList.remove("visible");
    
    if (current >= questions.length) {
        showFinalScore();
        return;
    }

    currentQ = prepare(questions[current]);
    let wrongTimes = wrongBook[currentQ.id] || 0;
    
    document.getElementById("sentence").innerText = currentQ.sentence;
    renderOptions();
}

function renderOptions() {
    let box = document.getElementById("options");
    box.innerHTML = "";
    currentQ.shuffledOptions.forEach((opt, i) => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => check(i, btn);
        box.appendChild(btn);
    });
}

function check(i, btn) {
    if (locked) return;
    locked = true;

    const resultEl = document.getElementById("result");
    const nextBtn = document.getElementById("next-btn");

    if (i === currentQ.correctIndex) {
        score += 5;
        btn.style.background = "#d4edda";
        btn.style.borderColor = "#28a745";
        resultEl.innerHTML = `<div>✔ 正确：【${currentQ.particle}】</div><div style='font-size:14px; font-weight:normal; color:#666;'>${currentQ.explanation}</div>`;
    } else {
        wrongBook[currentQ.id] = (wrongBook[currentQ.id] || 0) + 1;
        btn.style.background = "#f8d7da";
        btn.style.borderColor = "#dc3545";
        resultEl.innerText = `✘ 误。答案是：${currentQ.shuffledOptions[currentQ.correctIndex]}`;
    }
    
    updateScore();
    nextBtn.classList.add("visible");
}

function nextQuestion() {
    current++;
    loadQuestion();
}

function updateScore() {
    document.getElementById("scoreText").innerText = "得分：" + score + " / 100";
}

function toggleMode() {
    questions = [...originalQuestions].sort(() => Math.random() - 0.5);
    document.getElementById("modeText").innerText = "模式：乱序";
    resetGame();
}

function startWrongMode() {
    let ids = Object.keys(wrongBook);
    if (ids.length === 0) {
        alert("尚无错题记录。");
        return;
    }
    questions = originalQuestions.filter(q => ids.includes(String(q.id)));
    document.getElementById("modeText").innerText = "模式：复习错题";
    resetGame();
}

function resetGame() {
    current = 0;
    score = 0;
    updateScore();
    loadQuestion();
}

function showFinalScore() {
    document.getElementById("sentence").innerText = "🎉 练习结束";
    document.getElementById("options").innerHTML = `<div style="text-align:center; font-size:24px;">最终得分：${score}</div>`;
    document.getElementById("result").innerText = score >= 80 ? "学识渊博，善莫大焉！" : "温故而知新，再接再厉。";
    document.getElementById("next-btn").classList.remove("visible");
}

loadQuestion();
</script>

</body>
</html>
